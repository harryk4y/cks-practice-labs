name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build and deploy"
        required: true
        type: choice
        options:
          - all
          - app-only
          - workspace-only
      deploy:
        description: "Deploy to EKS after build?"
        required: true
        type: boolean
        default: true

env:
  AWS_REGION: eu-west-2
  CLUSTER_NAME: cks-practice-labs
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com
  APP_IMAGE: cks-practice-labs
  WORKSPACE_IMAGE: cks-workspace

permissions:
  id-token: write
  contents: read

jobs:
  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'app-only' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.APP_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.APP_IMAGE }}:${{ github.sha }}

  build-workspace:
    name: Build Workspace Image
    runs-on: ubuntu-latest
    if: ${{ inputs.target == 'all' || inputs.target == 'workspace-only' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push workspace image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/workspace
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.WORKSPACE_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.WORKSPACE_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-app, build-workspace]
    if: |
      always() &&
      inputs.deploy == true &&
      (needs.build-app.result == 'success' || needs.build-app.result == 'skipped') &&
      (needs.build-workspace.result == 'success' || needs.build-workspace.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy app
        if: ${{ inputs.target == 'all' || inputs.target == 'app-only' }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deploy/cks-practice-labs -n cks-practice-labs
          kubectl rollout status deploy/cks-practice-labs -n cks-practice-labs --timeout=120s

      - name: Deploy workspace
        if: ${{ inputs.target == 'all' || inputs.target == 'workspace-only' }}
        run: |
          kubectl apply -f k8s/workspace/
          kubectl rollout restart deploy/workspace -n cks-workspace
          kubectl rollout status deploy/workspace -n cks-workspace --timeout=120s

      - name: Deploy ingress
        if: ${{ inputs.target == 'all' }}
        run: kubectl apply -f k8s/ingress.yaml
